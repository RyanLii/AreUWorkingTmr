name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  core-tests:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Run core tests
        run: swift test --parallel
