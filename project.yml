name: AreUWorkingTmr
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 5.10
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    DEVELOPMENT_TEAM: D5HJ4LX2DA

packages:
  Shimmer:
    url: https://github.com/markiv/SwiftUI-Shimmer
    from: 1.5.1

targets:
  AreUWorkingTmr:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    dependencies:
      - target: AreUWorkingTmrWatch
        embed: true
      - package: Shimmer
        product: Shimmer
    sources:
      - path: iOSApp
      - path: Shared
    resources:
      - path: iOSApp/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nestroundlabs.AreUWorkingTmr
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: AreUWorkingTmr
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: iOSApp/AreUWorkingTmr.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: "Last Round?"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Location helps trigger drink-log and home-hydration reminders."
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "Location helps trigger drink-log and home-hydration reminders in the background."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        TARGETED_DEVICE_FAMILY: 1,2

  AreUWorkingTmrWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchApp
      - path: Shared
    resources:
      - path: WatchApp/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nestroundlabs.AreUWorkingTmr.watch
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: AreUWorkingTmrWatch
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: WatchApp/AreUWorkingTmrWatch.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: "Last Round?"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Location helps trigger missed-log and home-arrival reminders when available."
        INFOPLIST_KEY_WKApplication_WKSupportsRunningWithoutiOSApp: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.nestroundlabs.AreUWorkingTmr
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO

  AreUWorkingTmrTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Shared
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nestroundlabs.AreUWorkingTmrTests
        PRODUCT_NAME: AreUWorkingTmrTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  AreUWorkingTmr:
    build:
      targets:
        AreUWorkingTmr: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: AreUWorkingTmrTests

  AreUWorkingTmrWatch:
    build:
      targets:
        AreUWorkingTmrWatch: all
    run:
      config: Debug
